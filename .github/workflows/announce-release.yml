name: Announce release to Discord

# Posts a Discord embed to the #releases channel for every version tag.
# Tag push (v*) is the reliable signal — the same one publish-mcp.yml uses;
# GitHub `release` events do NOT fire for releases created via PAT on this repo,
# so we key off the tag instead. workflow_dispatch allows a manual test run
# against an existing tag without cutting a new version.
#
# Webhook URL lives in the repo secret DISCORD_RELEASE_WEBHOOK.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to announce (e.g. v0.11.7)"
        required: true

permissions:
  contents: read

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Post release to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "DISCORD_RELEASE_WEBHOOK not set — skipping." >&2
            exit 0
          fi
          url="https://github.com/${REPO}/releases/tag/${TAG}"
          # Use the GitHub Release notes if a Release exists for this tag; else a default line.
          body=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq '.body' 2>/dev/null || true)
          [ -z "$body" ] && body="New release: ${TAG}"
          # Discord embed descriptions cap at 4096; trim well under it.
          desc=$(printf '%s' "$body" | head -c 1500)
          payload=$(jq -n \
            --arg title "🚀 ${REPO}  ${TAG}" \
            --arg url "$url" \
            --arg desc "$desc" \
            '{username: "trovex releases",
              embeds: [{title: $title, url: $url, description: $desc, color: 5814783}]}')
          curl -fsS -H "Content-Type: application/json" -d "$payload" "$WEBHOOK"
