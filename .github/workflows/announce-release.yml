name: Announce release to Discord

# On every version tag (v*), posts two designed embeds:
#   - #release   (DISCORD_RELEASE_WEBHOOK)   -> concise card: highlight bullets + install
#   - #changelog (DISCORD_CHANGELOG_WEBHOOK) -> full release notes
# Tag push is the reliable signal (the same one publish-mcp.yml uses); GitHub
# `release` events do NOT fire Actions for PAT-created releases on this repo.
# workflow_dispatch allows a manual test run against an existing tag without
# cutting a new version. Each webhook is independent — an unset one is skipped.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to announce (e.g. v0.11.7)"
        required: true

permissions:
  contents: read

env:
  # trovex brand: emerald accent (ties to the token-savings story) + PNG logo.
  # LOGO = the current brand-kit avatar in Supabase (the kit rolled out 2026-06-26);
  # Discord embeds don't render SVG for icon/thumbnail, so use the 400px PNG.
  COLOR: "1098629"            # 0x10C685 emerald
  LOGO: "https://bxdpevnqdnjcehewbiyg.supabase.co/storage/v1/object/public/media/assets/brand-kit/trovex/social-avatar/avatar-400.png"
  SITE: "https://trovex.dev"

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          CHANGELOG_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_WEBHOOK:-}" ] && [ -z "${CHANGELOG_WEBHOOK:-}" ]; then
            echo "No Discord webhooks configured — skipping." >&2
            exit 0
          fi

          url="https://github.com/${REPO}/releases/tag/${TAG}"
          ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # PUBLISH-GATE: only announce a real, PUBLISHED (non-draft) GitHub release. A bare
          # tag with no release, or a draft, → skip — never post a contentless "New release" embed.
          rel=$(gh api "repos/${REPO}/releases/tags/${TAG}" 2>/dev/null || true)
          if [ -z "$rel" ] || [ "$(printf '%s' "$rel" | jq -r '.draft // false')" = "true" ]; then
            echo "No published (non-draft) release for ${TAG} — skipping." >&2
            exit 0
          fi
          body=$(printf '%s' "$rel" | jq -r '.body // ""')
          [ -z "$body" ] && body="Release ${TAG}"

          post() { # $1=webhook  $2=payload
            [ -z "${1:-}" ] && return 0
            curl -fsS -H "Content-Type: application/json" -d "$2" "$1" >/dev/null
          }

          # --- #release TEASER: curated ≤3 user-facing highlights (copy rule trovex 1888262f) -
          # The card is a TEASER, distinct from #changelog (full body) — was top-6 raw bullets,
          # which read near-identical to the changelog (owner: "très similaires"). Now:
          #  Path A: an authored "## Highlights" block wins (verbatim bullets, the voice path).
          hl=$(printf '%s\n' "$body" | awk '
            tolower($0) ~ /^#{1,6}[[:space:]]*highlights\b/ {grab=1; next}
            /^#{1,6}[[:space:]]/ {grab=0}
            grab && /^[[:space:]]*[-*][[:space:]]/ {print}')
          #  Path B: else keep ONLY feat/perf/fix bullets (drop chore/ci/docs/test/build/refactor/
          #  style/revert/deps + internal scopes), ordered perf → feat → fix (perf = the angle).
          if [ -z "$hl" ]; then
            base=$(printf '%s\n' "$body" | grep -ivE '\((ci|deps|release|build|repo|infra)\)')
            hl=$(
              printf '%s\n' "$base" | grep -iE '^[[:space:]]*[-*][[:space:]]+(\*\*)?perf(\([^)]*\))?:' || true
              printf '%s\n' "$base" | grep -iE '^[[:space:]]*[-*][[:space:]]+(\*\*)?feat(\([^)]*\))?:' || true
              printf '%s\n' "$base" | grep -iE '^[[:space:]]*[-*][[:space:]]+(\*\*)?fix(\([^)]*\))?:'  || true
            )
          fi
          # Clean each kept line: strip bullet marker + bold + type(scope): prefix, neutralize
          # em-dash (voice hardFail), uppercase the first letter, truncate ~100ch at a word
          # boundary, re-bullet. Cap 3.
          highlights=$(printf '%s\n' "$hl" \
            | sed -E 's/^[[:space:]]*[-*][[:space:]]+//; s/\*\*//g; s/^(feat|perf|fix)(\([^)]*\))?:[[:space:]]*//I; s/ — /: /g; s/—/, /g' \
            | awk 'NF' \
            | awk '{ $0=toupper(substr($0,1,1)) substr($0,2);
                     if (length($0)>100){ s=substr($0,1,97); sub(/[[:space:]][^[:space:]]*$/,"",s); $0=s "…" }
                     print "• " $0 }' \
            | head -3)
          # FALLBACK: pure chore/ci/docs release → one honest line, never dumped bullets.
          [ -z "$highlights" ] && highlights="Maintenance release under the hood. Full log → #changelog."

          install=$(printf '```\nuv tool upgrade trovex\n```')

          # --- #release: designed announce card -------------------------------
          announce=$(jq -n \
            --arg tag "$TAG" --arg url "$url" --arg desc "$highlights" \
            --arg install "$install" --arg ts "$ts" \
            --arg logo "$LOGO" --arg site "$SITE" --arg repo "$REPO" \
            --argjson color "$COLOR" \
            '{username: "trovex",
              avatar_url: $logo,
              embeds: [{
                author: {name: "trovex", url: $site, icon_url: $logo},
                title: ("🚀  " + $tag + " released"),
                url: $url,
                description: $desc,
                color: $color,
                thumbnail: {url: $logo},
                fields: [
                  {name: "Update", value: $install, inline: false},
                  {name: "Links", value: ("[Release notes](" + $url + ")  ·  [trovex.dev](" + $site + ")  ·  full log in #changelog"), inline: false}
                ],
                footer: {text: $repo, icon_url: $logo},
                timestamp: $ts
              }]}')
          post "$RELEASE_WEBHOOK" "$announce"

          # --- #changelog: full notes ----------------------------------------
          desc=$(printf '%s' "$body" | head -c 4000)
          changelog=$(jq -n \
            --arg tag "$TAG" --arg url "$url" --arg desc "$desc" --arg ts "$ts" \
            --arg logo "$LOGO" --arg site "$SITE" --arg repo "$REPO" \
            --argjson color "$COLOR" \
            '{username: "trovex",
              avatar_url: $logo,
              embeds: [{
                author: {name: "trovex · changelog", url: $site, icon_url: $logo},
                title: ("📝  Changelog — " + $tag),
                url: $url,
                description: $desc,
                color: $color,
                footer: {text: ($repo + " · full diff on GitHub"), icon_url: $logo},
                timestamp: $ts
              }]}')
          post "$CHANGELOG_WEBHOOK" "$changelog"
