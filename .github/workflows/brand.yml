name: brand

# Fails a PR that reintroduces a brand-rule violation on a PUBLIC product surface
# (README, web/, the served install templates). Rules spec = trovex doc 1dcec9e9
# (design-lead, locked); the guard is pure-stdlib, no deps.
#
# Runs on EVERY PR (no paths filter) so it is safe as a REQUIRED check — a
# path-filtered required check leaves non-scoped PRs stuck "Expected — waiting"
# forever. The job is cheap (~5s) and the guard itself only scans the public-surface
# SCOPE in scripts/brand_guard.py, so a non-scoped PR just passes clean.
on:
  pull_request:

jobs:
  brand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: brand guard
        run: python3 scripts/brand_guard.py
