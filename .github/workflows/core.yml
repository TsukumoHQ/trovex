name: core

# Gates the Python core (src/trovex + tests): ruff lint + the pytest suite.
# Runs only when the core changes so the web CI stays independent. This is the
# root-cause fix for the silent-debt incident — `ruff check` now runs on every
# PR, so lint debt can never accrue unnoticed again.
#
# NOTE: `ruff format --check` is intentionally NOT gated yet — the tree has a
# pre-existing 21-file format reflow deferred to a coordinated PR (cto-owned).
# That PR adds the format-check step here AND removes the temporary lint waivers
# in pyproject [tool.ruff.lint]. Until then this gate = lint + tests.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/core.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/core.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
      - name: ruff check
        run: uv run ruff check src tests
      - name: pytest
        run: uv run pytest -q
