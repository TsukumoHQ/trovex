name: security

# Fails a PR that introduces a new high/critical risk on a backend surface
# (dangerous call, hardcoded secret, raw SQL interpolation, or a committed
# credential file). Deterministic, pure-stdlib guard — see scripts/security_guard.py.
#
# Runs on EVERY PR (no paths filter) so it is safe as a REQUIRED check — a
# path-filtered required check leaves non-scoped PRs stuck "Expected — waiting"
# forever. The job is cheap (~5s) and the guard only scans the backend SCOPE, so
# a docs/web-only PR just passes clean. (Same shape as the brand gate.)
on:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: security guard
        run: python3 scripts/security_guard.py
