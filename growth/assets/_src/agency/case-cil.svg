<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-label="tsukumo case study: CI-Léman. production AI inside an existing real-estate platform, shipped into the team's dev environment — not a demo.">
  <defs><style>
    .d { font-family: 'Archivo','Inter Tight',system-ui,sans-serif; }
    .m { font-family: 'Space Mono','Geist Mono',ui-monospace,monospace; }
  </style></defs>
  <rect width="1200" height="750" fill="#121212"/>
  <rect x="0" y="0" width="1200" height="8" fill="#c8ff00"/>

  <text class="m" x="72" y="120" font-size="24" fill="#c8ff00">case · client</text>
  <text class="m" x="1128" y="120" font-size="60" font-weight="700" fill="#1b1a18" text-anchor="end">03</text>

  <text class="d" x="68" y="320" font-size="116" font-weight="800" letter-spacing="-0.035em" fill="#f3f1ea">CI-Léman</text>

  <rect x="74" y="430" width="110" height="9" fill="#c8ff00"/>
  <text class="m" x="72" y="498" font-size="26" fill="#f3f1ea" opacity="0.88">production AI inside an existing real-estate platform,</text>
