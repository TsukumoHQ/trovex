<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-label="Agency concept mock concrete-acid: we make agents behave.">
  <defs><style>
    .d { font-family: 'Fira Sans','Helvetica Neue',Arial,sans-serif; }
    .m { font-family: 'Fira Code','SF Mono',ui-monospace,monospace; }
  </style></defs>
  <rect width="1536" height="1024" fill="#101010"/>
  <image href="bg-concrete-acid.png" x="0" y="0" width="1536" height="1024" preserveAspectRatio="xMidYMid slice"/>
  <defs><linearGradient id="s" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#000" stop-opacity="0.55"/><stop offset="0.7" stop-color="#000" stop-opacity="0.12"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient></defs>
  <rect width="1536" height="1024" fill="url(#s)"/>
  <!-- top bar: placeholder wordmark + index + nav -->
  <rect x="96" y="84" width="20" height="20" fill="#c8ff00"/>
  <text class="m" x="128" y="100" font-size="22" font-weight="600" fill="#f4f2ec">studio</text>
  <text class="m" x="232" y="100" font-size="22" fill="#f4f2ec" opacity="0.6">[ working name ]</text>
  <text class="m" x="1440" y="100" font-size="22" fill="#f4f2ec" opacity="0.8" text-anchor="end">work · approach · contact</text>
  <text class="m" x="96" y="874" font-size="22" fill="#c8ff00">01 — 04</text>

  <text class="d" x="96" y="430" font-size="150" font-weight="800" letter-spacing="-0.03em" fill="#f4f2ec">we make</text>
  <text class="d" x="96" y="580" font-size="150" font-weight="800" letter-spacing="-0.03em" fill="#f4f2ec">agents</text>
  <text class="d" x="96" y="730" font-size="150" font-weight="800" letter-spacing="-0.03em" fill="#f4f2ec">behave.</text>
  <!-- accent rule + tagline -->
  <rect x="100" y="840" width="120" height="10" fill="#c8ff00"/>
  <text class="m" x="96" y="928" font-size="24" fill="#f4f2ec" opacity="0.85">studio — engineering for teams shipping AI</text>
  <text class="m" x="1440" y="928" font-size="22" fill="#f4f2ec" opacity="0.5" text-anchor="end">concept — type indicative</text>
