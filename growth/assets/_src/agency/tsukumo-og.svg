<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="tsukumo — run AI in production. Agentic operators for your dev team: augment, never replace. A dev studio and AI consulting. tsukumo.ch">
  <defs><style>
    .d { font-family: 'Archivo','Inter Tight',system-ui,sans-serif; }
    .m { font-family: 'Space Mono','Geist Mono',ui-monospace,monospace; }
  </style></defs>
  <rect width="1200" height="630" fill="#121212"/>
  <!-- acid edge slab -->
  <rect x="0" y="0" width="14" height="630" fill="#c8ff00"/>

  <!-- wordmark -->
  <rect x="72" y="80" width="22" height="22" fill="#c8ff00"/>
  <text class="d" x="106" y="100" font-size="30" font-weight="800" letter-spacing="-0.02em" fill="#f3f1ea">tsukumo</text>
  <text class="m" x="1128" y="99" font-size="20" fill="#f3f1ea" opacity="0.6" text-anchor="end">a dev studio + AI consulting</text>

  <!-- headline -->
  <text class="d" x="68" y="290" font-size="104" font-weight="800" letter-spacing="-0.035em" fill="#f3f1ea">run AI in</text>
  <text class="d" x="68" y="396" font-size="104" font-weight="800" letter-spacing="-0.035em" fill="#c8ff00">production.</text>

  <!-- sub -->
  <rect x="74" y="446" width="96" height="9" fill="#c8ff00"/>
  <text class="m" x="72" y="506" font-size="26" fill="#f3f1ea" opacity="0.9">agentic operators for your dev team —</text>
  <text class="m" x="72" y="540" font-size="26" fill="#f3f1ea" opacity="0.9">augment, never replace.</text>

  <!-- footer -->
  <line x1="72" y1="566" x2="1128" y2="566" stroke="rgba(243,241,234,0.14)" stroke-width="1.5"/>
  <text class="m" x="72" y="600" font-size="22" fill="#c8ff00">tsukumo.ch</text>
  <text class="m" x="1128" y="600" font-size="20" fill="#f3f1ea" opacity="0.5" text-anchor="end">01 — 04</text>
</svg>
