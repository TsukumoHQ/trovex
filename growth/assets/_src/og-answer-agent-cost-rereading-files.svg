<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="How much do AI agents spend rereading the same files? A big slice of every session — paid per agent, per teammate. trovex serves one current doc per query instead.">
  <defs><style>
    .sans { font-family: 'Fira Sans','Segoe UI',system-ui,-apple-system,sans-serif; }
    .mono { font-family: 'Fira Code','SF Mono',ui-monospace,monospace; }
  </style></defs>
  <rect width="1200" height="630" fill="#0a0e17"/>
  <rect x="0" y="0" width="1200" height="6" fill="#22c55e"/>

  <g>
    <rect x="64" y="92" width="132" height="44" rx="22" fill="#0f1a14" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="90" cy="114" r="6" fill="#22c55e"/>
    <text class="mono" x="108" y="121" font-size="20" fill="#cdd6e2">answer</text>
  </g>

  <text class="sans" x="64" y="210" font-size="48" font-weight="700" fill="#e6edf3">How much do AI agents spend</text>
  <text class="sans" x="64" y="274" font-size="48" font-weight="700" fill="#e6edf3">rereading the same files?</text>
  <line x1="64" y1="356" x2="1136" y2="356" stroke="#1c2430" stroke-width="2"/>
  <text class="sans" x="64" y="406" font-size="27" font-weight="400" fill="#9aa6b8">A big slice of every session — paid per agent, per teammate.</text>
  <text class="sans" x="64" y="450" font-size="27" font-weight="400" fill="#9aa6b8">trovex serves one current doc per query instead.</text>

  <g>
    <rect x="64" y="520" width="320" height="56" rx="12" fill="#0f1a14" stroke="#22c55e" stroke-width="1.5"/>
    <text class="sans" x="224" y="556" font-size="26" font-weight="700" fill="#22c55e" text-anchor="middle">~60% fewer tokens</text>
  </g>
  <text class="mono" x="1136" y="556" font-size="21" fill="#7c8798" text-anchor="end">trovex.dev · private beta</text>
</svg>
