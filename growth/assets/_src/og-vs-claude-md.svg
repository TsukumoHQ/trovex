<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="trovex vs CLAUDE.md and AGENTS.md. CLAUDE.md is one static file that goes stale and loads whole. trovex indexes and serves one current section per query with a freshness marker, about 60% fewer tokens. CLAUDE.md is still good for high-level rules.">
  <defs>
    <style>
      .sans { font-family: 'Fira Sans','Segoe UI',system-ui,-apple-system,sans-serif; }
      .mono { font-family: 'Fira Code','SF Mono',ui-monospace,monospace; }
    </style>
  </defs>
  <rect width="1200" height="630" fill="#0a0e17"/>
  <rect x="0" y="0" width="1200" height="6" fill="#22c55e"/>

  <text class="sans" x="64" y="88" font-size="42" font-weight="700" fill="#e6edf3">trovex <tspan fill="#7c8798">vs</tspan> CLAUDE.md / AGENTS.md</text>

  <!-- column headers -->
  <text class="mono" x="96" y="168" font-size="24" font-weight="600" fill="#8b97a8">CLAUDE.md / AGENTS.md</text>
  <text class="mono" x="664" y="168" font-size="24" font-weight="600" fill="#22c55e">trovex</text>
  <line x1="636" y1="140" x2="636" y2="500" stroke="#1c2430" stroke-width="2"/>
  <line x1="64" y1="186" x2="1136" y2="186" stroke="#1c2430" stroke-width="1.5"/>

  <g class="sans" font-size="25">
    <text x="96" y="246" fill="#9aa6b8">one static file</text>
    <text x="664" y="246" fill="#e6edf3">indexed, one answer per query</text>

    <text x="96" y="318" fill="#9aa6b8">goes stale silently</text>
    <text x="664" y="318" fill="#e6edf3">freshness marker:</text>
    <text x="664" y="350" class="mono" font-size="20" fill="#22c55e">★ canonical · ✗ stale · ⚠ duplicate</text>

    <text x="96" y="422" fill="#9aa6b8">whole file into context</text>
    <text x="664" y="422" fill="#e6edf3">just the section that answers</text>
    <text x="664" y="454" font-size="22" fill="#22c55e" font-weight="600">~60% fewer tokens per lookup</text>
  </g>

  <line x1="64" y1="524" x2="1136" y2="524" stroke="#1c2430" stroke-width="1.5"/>
  <text class="sans" x="64" y="572" font-size="22" fill="#7c8798">CLAUDE.md is great for high-level rules. trovex answers <tspan fill="#cdd6e2">which doc fits this query</tspan>.</text>
  <text class="mono" x="1136" y="572" font-size="20" fill="#5a6577" text-anchor="end">trovex.dev</text>
</svg>
