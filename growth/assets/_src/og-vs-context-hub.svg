<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="trovex vs context-hub (CTX). a general retrieval server fits broad search. trovex answers which repo doc is current.">
  <defs><style>
    .sans { font-family: 'Fira Sans','Segoe UI',system-ui,-apple-system,sans-serif; }
    .mono { font-family: 'Fira Code','SF Mono',ui-monospace,monospace; }
  </style></defs>
  <rect width="1200" height="630" fill="#0a0e17"/>
  <rect x="0" y="0" width="1200" height="6" fill="#22c55e"/>
  <text class="sans" x="64" y="88" font-size="42" font-weight="700" fill="#e6edf3">trovex <tspan fill="#7c8798">vs</tspan> context-hub (CTX)</text>
  <text class="mono" x="96" y="168" font-size="24" font-weight="600" fill="#8b97a8">chunk-retrieval server (CTX)</text>
  <text class="mono" x="664" y="168" font-size="24" font-weight="600" fill="#22c55e">trovex</text>
  <line x1="636" y1="140" x2="636" y2="500" stroke="#1c2430" stroke-width="2"/>
  <line x1="64" y1="186" x2="1136" y2="186" stroke="#1c2430" stroke-width="1.5"/>
  <g class="sans" font-size="25">
    <text x="96" y="246" fill="#9aa6b8">a ranked list of chunks</text>
    <text x="664" y="246" fill="#e6edf3">one canonical doc</text>
    <text x="96" y="318" fill="#9aa6b8">you pick from candidates</text>
    <text x="664" y="318" fill="#e6edf3">one current answer, path:line</text>
    <text x="96" y="390" fill="#9aa6b8">no freshness signal</text>
    <text x="664" y="390" fill="#e6edf3">★ canonical · ✗ stale markers</text>
    <text x="664" y="422" font-size="22" font-weight="600" fill="#22c55e">~60% fewer tokens per lookup</text>
  </g>
  <line x1="64" y1="524" x2="1136" y2="524" stroke="#1c2430" stroke-width="1.5"/>
  <text class="sans" x="64" y="572" font-size="22" fill="#7c8798">a general retrieval server fits broad search. trovex answers which repo doc is current.</text>
  <text class="mono" x="1136" y="572" font-size="20" fill="#5a6577" text-anchor="end">trovex.dev</text>
</svg>
