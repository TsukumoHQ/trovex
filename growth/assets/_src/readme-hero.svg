<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="448" viewBox="0 0 1280 448" role="img" aria-label="trovex — one canonical doc for your coding agents. Same answers, about 60% fewer tokens. local-first, MCP and CLI, private beta.">
  <defs>
    <style>
      .sans { font-family: 'Fira Sans','Segoe UI',system-ui,-apple-system,sans-serif; }
      .mono { font-family: 'Fira Code','SF Mono',ui-monospace,monospace; }
    </style>
    <linearGradient id="scrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a0e17" stop-opacity="0.98"/>
      <stop offset="0.6" stop-color="#0a0e17" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0a0e17" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="448" fill="#0a0e17"/>
  <image href="og-backdrop.png" x="0" y="0" width="1280" height="448" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1280" height="448" fill="url(#scrim)"/>
  <rect x="0" y="0" width="1280" height="5" fill="#22c55e"/>

  <!-- wordmark lockup -->
  <g transform="translate(72,96)">
    <circle cx="22" cy="22" r="21" fill="none" stroke="#22c55e" stroke-opacity="0.32" stroke-width="2.5"/>
    <circle cx="22" cy="22" r="11" fill="#22c55e"/>
    <text class="mono" x="60" y="34" font-size="48" font-weight="600" fill="#e6edf3">trovex</text>
  </g>

  <text class="sans" x="72" y="232" font-size="40" font-weight="700" fill="#e6edf3">one canonical doc for your <tspan fill="#22c55e">coding agents</tspan></text>
  <text class="sans" x="72" y="284" font-size="27" font-weight="400" fill="#9aa6b8">same answers, about <tspan fill="#e6edf3" font-weight="600">60% fewer tokens</tspan> per lookup</text>

  <text class="mono" x="72" y="372" font-size="22" fill="#7c8798">local-first · MCP + CLI · <tspan fill="#22c55e">private beta</tspan></text>
</svg>
