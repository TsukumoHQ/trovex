<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840" role="img" aria-label="Stop your coding agents rereading the repo. One canonical doc, path and line with a freshness marker. Same answers, about 60% fewer tokens. Now in private beta — request access at trovex.dev.">
  <defs>
    <style>
      .sans { font-family: 'Fira Sans','Segoe UI',system-ui,-apple-system,sans-serif; }
      .mono { font-family: 'Fira Code','SF Mono',ui-monospace,monospace; }
    </style>
    <linearGradient id="scrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a0e17" stop-opacity="0.98"/>
      <stop offset="0.62" stop-color="#0a0e17" stop-opacity="0.84"/>
      <stop offset="1" stop-color="#0a0e17" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="vscrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e17" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#0a0e17" stop-opacity="0"/>
      <stop offset="1" stop-color="#0a0e17" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="840" fill="#0a0e17"/>
  <image href="og-backdrop.png" x="0" y="0" width="1600" height="840" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="840" fill="url(#scrim)"/>
  <rect width="1600" height="840" fill="url(#vscrim)"/>
  <rect x="0" y="0" width="1600" height="6" fill="#22c55e"/>

  <!-- wordmark + beta pill -->
  <g transform="translate(96,108)">
    <circle cx="16" cy="0" r="15" fill="none" stroke="#22c55e" stroke-opacity="0.32" stroke-width="2.5"/>
    <circle cx="16" cy="0" r="8" fill="#22c55e"/>
    <text class="mono" x="48" y="9" font-size="30" font-weight="600" fill="#e6edf3">trovex</text>
    <g transform="translate(230,-25)">
      <rect x="0" y="0" width="210" height="48" rx="24" fill="#0f1a14" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="28" cy="24" r="6" fill="#22c55e"/>
      <text class="mono" x="46" y="32" font-size="20" fill="#cdd6e2">private beta</text>
    </g>
  </g>

  <!-- headline -->
  <g class="sans" fill="#e6edf3" font-weight="700" font-size="86">
    <text x="96" y="346">stop your agents</text>
    <text x="96" y="446">rereading <tspan fill="#22c55e">the repo.</tspan></text>
  </g>

  <text class="sans" x="96" y="534" font-size="34" font-weight="400" fill="#9aa6b8">one canonical doc — path:line + freshness, not six files to guess from.</text>
  <text class="sans" x="96" y="582" font-size="34" font-weight="400" fill="#9aa6b8">same answers, <tspan fill="#e6edf3" font-weight="600">~60% fewer tokens</tspan> per lookup.</text>

  <!-- CTA -->
  <rect x="96" y="650" width="380" height="78" rx="14" fill="#22c55e"/>
  <text class="sans" x="286" y="699" font-size="30" font-weight="700" fill="#06210f" text-anchor="middle">request beta access</text>
  <text class="mono" x="504" y="699" font-size="26" fill="#7c8798">trovex.dev</text>

  <text class="mono" x="96" y="788" font-size="22" fill="#5a6577">local-first · SQLite + on-device embeddings · no cloud, no keys · open core</text>
</svg>
