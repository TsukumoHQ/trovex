<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Trovex — one source of truth for your agents' docs</title>
    <meta
      name="description"
      content="Your coding agents reread the same .md files every session to work out which is current. Trovex keeps the canonical copy and hands them one answer, for about 60% fewer tokens."
    />
    <meta property="og:title" content="Trovex — a canonical index for your agents' docs" />
    <meta
      property="og:description"
      content="One canonical answer instead of six files to guess from. About 60% fewer tokens per lookup."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!--
      Privacy-respecting analytics (Plausible): cookieless, no consent banner, no PII.
      Served first-party via /js/script.js + /api/event (see vercel.json rewrites) so
      ad-blockers don't drop our dev audience. Plausible auto-skips localhost.
      Swap-out point: replace this block to change provider — web/src/analytics.ts is
      provider-agnostic and no-ops until window.plausible exists.
    -->
    <script
      defer
      data-domain="trovex.dev"
      data-api="/api/event"
      src="/js/script.js"
    ></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          ;(window.plausible.q = window.plausible.q || []).push(arguments)
        }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
