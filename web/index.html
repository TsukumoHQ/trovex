          "url": "https://trovex.dev/",

          "isAccessibleForFree": true,

            "Serves one canonical answer per query with freshness markers (canonical / stale / duplicate), not a pile of candidate chunks",
            "Section-level reads: returns the paragraph that answers, not the whole file",

            {
              "@type": "Question",
              "name": "Why not just a CLAUDE.md or AGENTS.md?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Those are one static file. They go stale, don't scale past a handful of topics, and can't route a question to the right doc or section. Trovex keeps many docs canonical and serves the one that answers."

            },
            {
              "@type": "Question",
              "name": "My context window is huge. Why bother?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The cost compounds: every session, every agent, every teammate. And a big window isn't a current one. Trovex serves the right doc, cheaply, every time."

              }
            },
            {
              "@type": "Question",
              "name": "Does my code leave my machine?",
              "acceptedAnswer": {

    <!--
      Privacy-respecting analytics (Plausible): cookieless, no consent banner, no PII.
      Served first-party via /js/script.js + /api/event (see vercel.json rewrites) so
      ad-blockers don't drop our dev audience. Plausible auto-skips localhost.
      Swap-out point: replace this block to change provider — web/src/analytics.ts is
      provider-agnostic and no-ops until window.plausible exists.
    -->
    <script defer data-domain="trovex.dev" data-api="/api/event" src="/js/script.js"></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          ;(window.plausible.q = window.plausible.q || []).push(arguments)
        }
