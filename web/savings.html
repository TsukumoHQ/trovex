<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0d1119" />
    <link rel="canonical" href="https://trovex.dev/savings" />
    <title>trovex — token-savings estimate for your coding agents</title>
    <meta
      name="description"
      content="Estimate how many tokens your coding agents burn rereading the repo, and what trovex saves by handing them one canonical answer. Client-side, no install, your numbers stay on the page."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="trovex" />
    <meta property="og:url" content="https://trovex.dev/savings" />
    <meta property="og:title" content="trovex — token-savings estimate" />
    <meta
      property="og:description"
      content="Estimate the tokens your agents waste rereading docs, and what one canonical answer saves. About 60% fewer tokens per lookup."
    />
    <!-- Tool-specific OG card (the generic ~60% brand card from the savings-card
         renderer) so a bare /savings share previews as the calculator, not the
         generic landing image — lifts share CTR on the seed artifact. -->
    <meta property="og:image" content="https://trovex.dev/api/savings-card" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="trovex token-savings calculator — about 60% fewer tokens per doc lookup" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="trovex — token-savings estimate" />
    <meta name="twitter:image" content="https://trovex.dev/api/savings-card" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "BreadcrumbList",
            "itemListElement": [
              { "@type": "ListItem", "position": 1, "name": "trovex", "item": "https://trovex.dev/" },
              { "@type": "ListItem", "position": 2, "name": "Token-savings calculator", "item": "https://trovex.dev/savings" }
            ]
          },
          {
            "@type": "WebApplication",
            "name": "trovex token-savings calculator",
            "url": "https://trovex.dev/savings",
            "description": "Estimate how many tokens your coding agents burn rereading the repo each session, and what trovex saves by serving one canonical answer per query — about 60% fewer tokens per lookup. Runs client-side; your numbers stay on the page.",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Any (web browser)",
            "isAccessibleForFree": true,
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "publisher": { "@type": "Organization", "name": "trovex", "url": "https://trovex.dev/" }
          }
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Same first-party Plausible setup as the landing (cookieless, no PII). -->
    <script defer data-domain="trovex.dev" data-api="/api/event" src="/js/script.js"></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          ;(window.plausible.q = window.plausible.q || []).push(arguments)
        }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/savings/main.tsx"></script>
  </body>
</html>
